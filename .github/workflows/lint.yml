name: Lint
on: [push, pull_request]
jobs:
  lint:
    uses: open-contracting/.github/.github/workflows/lint.yml@main
    permissions:
      contents: write
    secrets:
      personal-access-token: ${{ secrets.PAT }}
    with:
      local-basedir: true
      ocds-schema-exceptions: codelist-schema.json,extension-schema.json
